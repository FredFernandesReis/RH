<header class="page-header reveal{% if page_header_class %} {{ page_header_class }}{% endif %}">
    {% if page_eyebrow %}<p class="public-eyebrow mb-2">{{ page_eyebrow }}</p>{% endif %}
    <span class="section-heading-accent d-block"></span>
    <h1 class="page-header-title mb-2">{{ page_title }}</h1>
    {% if page_lead %}<p class="text-muted page-header-lead mb-0">{{ page_lead }}</p>{% endif %}
</header>
